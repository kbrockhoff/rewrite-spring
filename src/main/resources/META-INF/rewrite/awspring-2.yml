---
type: specs.openrewrite.org/v1beta/recipe
name: org.openrewrite.java.awspring.MigrateSpringCloudAWSMaven
displayName: Migrate from Spring Cloud AWS to AWSpring 2.4.x
description: Migrate legacy Spring Cloud AWS to AWS Spring Project.
tags:
  - spring
  - cloud
preconditions:
  - org.openrewrite.maven.search.FindManagedDependency:
      groupId: org.springframework.cloud
      artifactId: spring-cloud-dependencies
recipeList:
  - org.openrewrite.maven.AddManagedDependency:
      groupId: io.awspring.cloud
      artifactId: spring-cloud-aws-dependencies
      version: 2.4.4
      type: pom
      scope: import

---
type: specs.openrewrite.org/v1beta/recipe
name: org.openrewrite.java.awspring.MigrateSpringCloudAWSGradle
displayName: Migrate from Spring Cloud AWS to AWSpring 2.4.x
description: Migrate legacy Spring Cloud AWS to AWS Spring Project.
tags:
  - spring
  - cloud
preconditions:
  - org.openrewrite.gradle.search.FindDependency:
      groupId: org.springframework.cloud
      artifactId: spring-cloud-dependencies
recipeList:
  - org.openrewrite.gradle.AddPlatformDependency:
      groupId: io.awspring.cloud
      artifactId: spring-cloud-aws-dependencies
      version: 2.4.4
