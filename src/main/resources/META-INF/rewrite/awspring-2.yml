type: specs.openrewrite.org/v1beta/recipe
name: org.openrewrite.java.awspring.MigrateSpringCloudAWSBom
displayName: Migrate from Spring Cloud to AWS Spring BOM
description: Migrate legacy Spring Cloud AWS to AWS Spring project.
tags:
